services:
  db:
    image: postgres:16-alpine
    container_name: ai-sme-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_sme_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_sme_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-sme-app
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ai_sme_platform?schema=public
      NEXTAUTH_URL: http://localhost:3100
      AUTH_TRUST_HOST: "true"
      NODE_ENV: production
    ports:
      - "3100:3100"

volumes:
  postgres_data:
